<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; media-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
  <title>Kumite Scoreboard</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    #splash_video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <video id="splash_video" autoplay playsinline></video>
  <script>
    (function () {
      var video = document.getElementById('splash_video');
      var finished = false;

      function finish() {
        if (finished) return;
        finished = true;
        if (window.kumiteAPI && window.kumiteAPI.send) {
          window.kumiteAPI.send('splash-done');
        }
      }

      video.src = 'kumite-splash.mp4';
      video.addEventListener('ended', finish);
      video.addEventListener('error', finish);

      // Allow the user to skip the intro.
      window.addEventListener('click', finish);
      window.addEventListener('keydown', finish);

      // Safety net in case 'ended' never fires.
      setTimeout(finish, 14000);

      // Try to autoplay with sound; if blocked, retry muted.
      var attempt = video.play();
      if (attempt && typeof attempt.catch === 'function') {
        attempt.catch(function () {
          video.muted = true;
          video.play().catch(finish);
        });
      }
    })();
  </script>
</body>
</html>
